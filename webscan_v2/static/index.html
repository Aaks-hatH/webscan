<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebScan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700;800;900&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>

/* ── Reset ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  /* Canvas */
  --bg:    #0C0C0F;
  --s1:    #131316;
  --s2:    #1A1A1E;
  --s3:    #222227;
  --s4:    #2C2C32;

  /* Text */
  --t0: #F5F5F7;
  --t1: #ABABB3;
  --t2: #5C5C66;
  --t3: #2E2E36;

  /* Border */
  --b0: rgba(255,255,255,0.10);
  --b1: rgba(255,255,255,0.06);
  --b2: rgba(255,255,255,0.03);

  /* Accent — Kalshi lime */
  --lime:    #C5FF6A;
  --lime2:   #D8FF8F;
  --limedim: rgba(197,255,106,0.10);
  --limeglo: rgba(197,255,106,0.15);

  /* Severity */
  --sc: #FF4949;
  --sh: #FF8C3D;
  --sm: #FFD23F;
  --sl: #4B9BFF;
  --si: #5C5C66;

  /* Misc */
  --r:  5px;
  --r2: 9px;
  --r3: 13px;

  --f:  'Figtree', system-ui, sans-serif;
  --fm: 'Fira Code', monospace;
}

html { scroll-behavior: smooth; }
body {
  font-family: var(--f);
  background: var(--bg);
  color: var(--t0);
  min-height: 100vh;
  font-size: 13.5px;
  line-height: 1.55;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ── App shell ── */
#app { display: flex; min-height: 100vh; }
main {
  margin-left: 228px;
  flex: 1;
  padding: 0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
.main-inner {
  padding: 32px 36px 48px;
  flex: 1;
}

/* ── Sidebar ── */
#sidebar {
  width: 228px;
  min-height: 100vh;
  background: var(--s1);
  border-right: 1px solid var(--b1);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 50;
  overflow-y: auto;
}

/* Sidebar logo */
.sb-top {
  padding: 20px 16px 16px;
  border-bottom: 1px solid var(--b2);
}
.sb-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 0;
}
.sb-icon {
  width: 32px; height: 32px;
  background: var(--lime);
  border-radius: var(--r);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.sb-icon svg { width: 16px; height: 16px; }
.sb-wordmark {
  font-size: .95rem;
  font-weight: 800;
  color: var(--t0);
  letter-spacing: -.03em;
}
.sb-build {
  font-family: var(--fm);
  font-size: .58rem;
  color: var(--t2);
  margin-top: 1px;
  letter-spacing: .04em;
}

/* Sidebar nav */
.sb-nav { padding: 8px 8px 0; flex: 1; }
.sb-group {
  font-family: var(--fm);
  font-size: .6rem;
  font-weight: 500;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--t3);
  padding: 14px 8px 4px;
}
.sb-link {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 8px 10px;
  border-radius: var(--r);
  cursor: pointer;
  color: var(--t2);
  font-size: .84rem;
  font-weight: 500;
  transition: background .12s, color .12s;
  user-select: none;
  position: relative;
}
.sb-link:hover { background: var(--s2); color: var(--t1); }
.sb-link.active {
  background: var(--limedim);
  color: var(--lime);
}
.sb-link svg { width: 14px; height: 14px; flex-shrink: 0; opacity: .7; }
.sb-link.active svg { opacity: 1; }
.sb-badge {
  margin-left: auto;
  font-family: var(--fm);
  font-size: .55rem;
  padding: 2px 5px;
  border-radius: 3px;
  background: rgba(139,92,246,.15);
  color: #a78bfa;
  letter-spacing: .05em;
  font-weight: 500;
}

/* Sidebar footer */
.sb-footer {
  padding: 12px 10px 16px;
  border-top: 1px solid var(--b2);
  margin-top: auto;
}
.sb-user {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 6px 10px;
}
.sb-av {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--lime);
  display: flex; align-items: center; justify-content: center;
  font-size: .72rem;
  font-weight: 800;
  color: #000;
  flex-shrink: 0;
}
.sb-name {
  font-size: .83rem;
  font-weight: 600;
  color: var(--t0);
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.sb-crown { color: var(--sm); font-size: .7rem; }
.sb-btns { display: flex; gap: 5px; }

/* ── Auth ── */
#auth-wrapper {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
}
.auth-box {
  width: 380px;
  animation: rise .45s cubic-bezier(.16,1,.3,1) both;
}
@keyframes rise { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }

.auth-hd {
  text-align: center;
  margin-bottom: 28px;
}
.auth-hd h1 {
  font-size: 2.4rem;
  font-weight: 900;
  color: var(--t0);
  letter-spacing: -.04em;
  line-height: 1;
}
.auth-hd h1 span { color: var(--lime); }
.auth-hd p {
  font-family: var(--fm);
  font-size: .68rem;
  color: var(--t2);
  margin-top: 8px;
  letter-spacing: .06em;
}

.auth-card {
  background: var(--s1);
  border: 1px solid var(--b0);
  border-radius: var(--r3);
  overflow: hidden;
}
.auth-tabs {
  display: flex;
  border-bottom: 1px solid var(--b1);
}
.atab-btn {
  flex: 1;
  padding: 13px;
  text-align: center;
  cursor: pointer;
  font-size: .82rem;
  font-weight: 600;
  color: var(--t2);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: color .12s, border-color .12s;
}
.atab-btn:hover { color: var(--t1); }
.atab-btn.active { color: var(--lime); border-bottom-color: var(--lime); }
.auth-body { padding: 22px; }
.auth-foot {
  padding: 0 22px 18px;
  font-family: var(--fm);
  font-size: .62rem;
  color: var(--t3);
  text-align: center;
}

/* ── Form ── */
.fg { margin-bottom: 13px; }
.fg label {
  display: block;
  font-family: var(--fm);
  font-size: .65rem;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--t2);
  margin-bottom: 5px;
  font-weight: 500;
}
.fg input, .fg select, .fg textarea {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--b0);
  border-radius: var(--r);
  padding: 9px 11px;
  color: var(--t0);
  font-size: .88rem;
  font-family: var(--f);
  outline: none;
  transition: border-color .14s, box-shadow .14s;
  -webkit-appearance: none;
}
.fg input:focus, .fg select:focus {
  border-color: var(--lime);
  box-shadow: 0 0 0 3px var(--limedim);
}
.fg input::placeholder { color: var(--t3); }
.fg select { cursor: pointer; }

/* ── Alerts ── */
.err {
  background: rgba(255,73,73,.07);
  border: 1px solid rgba(255,73,73,.2);
  border-radius: var(--r);
  padding: 9px 12px;
  color: #ff9999;
  font-family: var(--fm);
  font-size: .78rem;
  margin-bottom: 13px;
}
.ok {
  background: rgba(197,255,106,.07);
  border: 1px solid rgba(197,255,106,.2);
  border-radius: var(--r);
  padding: 9px 12px;
  color: var(--lime2);
  font-family: var(--fm);
  font-size: .78rem;
  margin-bottom: 13px;
}

/* ── Buttons ── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: var(--r);
  font-size: .82rem;
  font-weight: 700;
  font-family: var(--f);
  border: none;
  cursor: pointer;
  white-space: nowrap;
  outline: none;
  transition: all .13s;
}
.btn-lime {
  background: var(--lime);
  color: #000;
}
.btn-lime:hover {
  background: var(--lime2);
  transform: translateY(-1px);
}
.btn-lime:disabled { opacity: .3; cursor: not-allowed; transform: none; }
.btn-ghost {
  background: transparent;
  color: var(--t1);
  border: 1px solid var(--b0);
}
.btn-ghost:hover { background: var(--s2); color: var(--t0); }
.btn-danger {
  background: rgba(255,73,73,.09);
  color: #ff9999;
  border: 1px solid rgba(255,73,73,.18);
}
.btn-danger:hover { background: rgba(255,73,73,.17); }
.btn-warn {
  background: rgba(255,210,63,.09);
  color: #ffe680;
  border: 1px solid rgba(255,210,63,.18);
}
.btn-warn:hover { background: rgba(255,210,63,.17); }
.btn-sm { padding: 5px 10px; font-size: .75rem; }
.btn-full { width: 100%; justify-content: center; }

/* ── Page structure ── */
.pg-hd {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 26px;
}
.pg-title {
  font-size: 1.35rem;
  font-weight: 800;
  color: var(--t0);
  letter-spacing: -.03em;
  line-height: 1.1;
}
.pg-sub {
  font-family: var(--fm);
  font-size: .68rem;
  color: var(--t2);
  margin-top: 4px;
  letter-spacing: .04em;
}

/* ── Stat row ── */
.stat-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px,1fr));
  gap: 8px;
  margin-bottom: 22px;
}
.stat {
  background: var(--s1);
  border: 1px solid var(--b1);
  border-radius: var(--r2);
  padding: 14px 16px;
  transition: border-color .15s;
}
.stat:hover { border-color: var(--b0); }
.stat-lbl {
  font-family: var(--fm);
  font-size: .6rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--t2);
  margin-bottom: 5px;
}
.stat-val {
  font-size: 1.9rem;
  font-weight: 800;
  color: var(--t0);
  line-height: 1;
  letter-spacing: -.04em;
  font-variant-numeric: tabular-nums;
}
.stat-foot {
  font-family: var(--fm);
  font-size: .65rem;
  color: var(--t2);
  margin-top: 3px;
}

/* ── Card ── */
.card {
  background: var(--s1);
  border: 1px solid var(--b1);
  border-radius: var(--r2);
  padding: 18px 20px;
}
.card-title {
  font-size: .88rem;
  font-weight: 700;
  color: var(--t0);
  margin-bottom: 14px;
  letter-spacing: -.01em;
}

/* ── Scan list ── */
.scan-list { display: flex; flex-direction: column; gap: 3px; }
.scan-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  border-radius: var(--r);
  cursor: pointer;
  transition: background .12s;
  border: 1px solid transparent;
}
.scan-row:hover { background: var(--s2); border-color: var(--b1); }
.scan-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}
.dot-c { background: var(--lime); }
.dot-r { background: var(--sl); animation: dot-pulse 2s ease infinite; }
.dot-p { background: var(--t3); }
.dot-e { background: var(--sc); }
@keyframes dot-pulse {
  0%,100% { opacity:1; box-shadow: 0 0 0 0 rgba(75,155,255,.4); }
  50%      { opacity:.7; box-shadow: 0 0 0 5px rgba(75,155,255,0); }
}
.scan-info { flex: 1; min-width: 0; }
.scan-url {
  font-size: .85rem;
  font-weight: 600;
  color: var(--t0);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.scan-meta {
  font-family: var(--fm);
  font-size: .64rem;
  color: var(--t2);
  margin-top: 2px;
}
.scan-chips { display: flex; gap: 3px; flex-shrink: 0; }
.chip {
  font-family: var(--fm);
  font-size: .6rem;
  font-weight: 600;
  padding: 2px 6px;
  border-radius: 3px;
  letter-spacing: .04em;
}
.chip-c { background: rgba(255,73,73,.12);  color: var(--sc); }
.chip-h { background: rgba(255,140,61,.12); color: var(--sh); }
.chip-m { background: rgba(255,210,63,.12); color: var(--sm); }

/* ── Status pills ── */
.spill {
  font-family: var(--fm);
  font-size: .62rem;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 20px;
  white-space: nowrap;
  letter-spacing: .04em;
}
.sp-complete { background: rgba(197,255,106,.1);  color: var(--lime); }
.sp-running  { background: rgba(75,155,255,.1);    color: var(--sl); animation: blink 2s ease infinite; }
.sp-pending  { background: rgba(255,255,255,.05);  color: var(--t2); }
.sp-error    { background: rgba(255,73,73,.1);     color: var(--sc); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.45} }

/* ── Profile cards ── */
.prof-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 7px; margin-bottom: 18px; }
.prof-card {
  padding: 13px 10px;
  border: 1px solid var(--b1);
  border-radius: var(--r2);
  cursor: pointer;
  text-align: center;
  background: var(--bg);
  transition: all .13s;
  position: relative;
  overflow: hidden;
}
.prof-card:hover { border-color: var(--b0); }
.prof-card.sel {
  border-color: var(--lime);
  background: var(--limedim);
}
.prof-card.sel::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--lime);
}
.prof-tag { font-family: var(--fm); font-size: .62rem; color: var(--lime); margin-bottom: 5px; letter-spacing: .08em; }
.prof-name { font-size: .8rem; font-weight: 700; color: var(--t0); }
.prof-desc { font-size: .66rem; color: var(--t2); margin-top: 3px; line-height: 1.3; }

/* ── Module toggles ── */
.tog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px,1fr)); gap: 4px; }
.tog {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 9px;
  background: var(--bg);
  border: 1px solid var(--b1);
  border-radius: var(--r);
  cursor: pointer;
  font-size: .78rem;
  font-weight: 500;
  color: var(--t1);
  transition: border-color .12s;
}
.tog:hover { border-color: var(--b0); }
.tog input { accent-color: var(--lime); cursor: pointer; }

/* ── Section label ── */
.sec {
  font-family: var(--fm);
  font-size: .6rem;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--t2);
  margin-bottom: 9px;
  font-weight: 500;
}

/* ── Terminal / scan ── */
.term {
  background: #09090C;
  border: 1px solid var(--b0);
  border-radius: var(--r2);
  padding: 13px 14px;
  font-family: var(--fm);
  font-size: .72rem;
  max-height: 200px;
  overflow-y: auto;
  color: rgba(197,255,106,.4);
  line-height: 1.85;
}
.term::-webkit-scrollbar { width: 3px; }
.term::-webkit-scrollbar-thumb { background: var(--b0); border-radius: 2px; }
.t-phase { color: var(--lime); font-weight: 600; }
.t-find  { color: var(--sm); }
.t-err   { color: var(--sc); }
.t-ok    { color: var(--lime); }
.tcursor::after { content: '|'; animation: tc .9s step-end infinite; color: var(--lime); }
@keyframes tc { 0%,100%{opacity:1} 50%{opacity:0} }

.pb-wrap { height: 2px; background: var(--s3); border-radius: 1px; overflow: hidden; margin: 9px 0; }
.pb {
  height: 100%;
  border-radius: 1px;
  background: var(--lime);
  transition: width .5s cubic-bezier(.4,0,.2,1);
  position: relative;
  overflow: hidden;
}
.pb::after {
  content: '';
  position: absolute;
  top:0; left:-100%; width:100%; height:100%;
  background: linear-gradient(90deg,transparent,rgba(255,255,255,.5),transparent);
  animation: pbsh 2s ease infinite;
}
@keyframes pbsh { to { left:100%; } }

.lf-list { max-height: 180px; overflow-y: auto; margin-top: 10px; }
.lf-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 8px;
  border-bottom: 1px solid var(--b2);
  font-size: .75rem;
  animation: lf .18s ease;
}
@keyframes lf { from{opacity:0;transform:translateX(-5px)} to{opacity:1;transform:none} }
.xdot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

/* ── Findings ── */
.filter-bar { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 13px; align-items: center; }
.fb {
  padding: 3px 10px;
  border-radius: 20px;
  border: 1px solid var(--b0);
  background: transparent;
  cursor: pointer;
  font-family: var(--fm);
  font-size: .63rem;
  font-weight: 600;
  letter-spacing: .04em;
  transition: all .11s;
}
.fb:hover { background: var(--s2); }
.fb.on { background: var(--s3); border-color: currentColor; }
.f-lbl { font-family: var(--fm); font-size: .6rem; color: var(--t3); letter-spacing: .1em; }

.fi { border: 1px solid var(--b1); border-radius: var(--r2); margin-bottom: 4px; overflow: hidden; transition: border-color .13s; }
.fi:hover { border-color: var(--b0); }
.fi-hd {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 10px 14px;
  cursor: pointer;
  border-left: 2px solid currentColor;
  transition: background .12s;
}
.fi-hd:hover { background: var(--s2); }
.fi-bd {
  padding: 13px 16px;
  border-top: 1px solid var(--b1);
  background: var(--bg);
  display: none;
  animation: fd .16s ease;
}
.fi-bd.open { display: block; }
@keyframes fd { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:none} }
.fi-type { font-size: .85rem; font-weight: 700; flex: 1; color: var(--t0); }

.sev-pll {
  display: inline-block;
  padding: 2px 7px;
  border-radius: 3px;
  font-family: var(--fm);
  font-size: .6rem;
  font-weight: 700;
  letter-spacing: .06em;
}

.mtbl { width: 100%; font-size: .79rem; margin: 7px 0 11px; }
.mtbl tr td { padding: 3px 0; vertical-align: top; }
.mtbl tr td:first-child {
  font-family: var(--fm);
  font-size: .62rem;
  letter-spacing: .07em;
  text-transform: uppercase;
  color: var(--t2);
  width: 105px;
  padding-right: 8px;
}
.mtbl tr td:last-child { font-family: var(--fm); font-size: .71rem; word-break: break-all; color: var(--t1); }

pre.code {
  background: #09090C;
  border: 1px solid var(--b0);
  border-radius: var(--r);
  padding: 9px 12px;
  font-family: var(--fm);
  font-size: .71rem;
  color: rgba(197,255,106,.75);
  overflow-x: auto;
  white-space: pre-wrap;
  word-break: break-all;
  margin: 5px 0;
}
.mit {
  background: rgba(197,255,106,.04);
  border-left: 2px solid rgba(197,255,106,.25);
  padding: 9px 13px;
  border-radius: 0 var(--r) var(--r) 0;
  font-size: .79rem;
  color: rgba(197,255,106,.8);
  margin-top: 8px;
  line-height: 1.65;
}

/* ── Tables ── */
table.tbl { width: 100%; border-collapse: collapse; font-size: .8rem; }
table.tbl th {
  text-align: left;
  padding: 9px 11px;
  border-bottom: 1px solid var(--b0);
  font-family: var(--fm);
  font-size: .6rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--t2);
  font-weight: 500;
}
table.tbl td { padding: 9px 11px; border-bottom: 1px solid var(--b1); vertical-align: middle; }
table.tbl tbody tr:hover td { background: var(--s2); }

/* ── Admin tabs ── */
.admin-tabs { display: flex; border-bottom: 1px solid var(--b1); margin-bottom: 20px; overflow-x: auto; }
.admin-tab {
  padding: 9px 16px;
  cursor: pointer;
  font-size: .82rem;
  font-weight: 600;
  color: var(--t2);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: color .12s, border-color .12s;
  white-space: nowrap;
}
.admin-tab:hover { color: var(--t1); }
.admin-tab.active { color: var(--lime); border-bottom-color: var(--lime); }

/* ── Sev bars ── */
.sev-bar { display: flex; align-items: center; gap: 9px; margin-bottom: 7px; }
.sb-l { width: 66px; font-family: var(--fm); font-size: .62rem; font-weight: 600; letter-spacing: .04em; }
.sb-t { flex: 1; height: 3px; background: var(--s3); border-radius: 2px; overflow: hidden; }
.sb-f { height: 100%; border-radius: 2px; transition: width .65s cubic-bezier(.4,0,.2,1); }
.sb-n { width: 25px; text-align: right; font-family: var(--fm); font-size: .7rem; color: var(--t2); }

/* ── Report btns ── */
.rbt {
  display: inline-flex;
  align-items: center;
  padding: 5px 11px;
  border-radius: var(--r);
  font-family: var(--fm);
  font-size: .68rem;
  font-weight: 600;
  border: 1px solid var(--b0);
  color: var(--t2);
  background: transparent;
  cursor: pointer;
  transition: all .12s;
  letter-spacing: .04em;
}
.rbt:hover { border-color: var(--limeglo); color: var(--lime); background: var(--limedim); }

/* ── Misc ── */
.tag {
  display: inline-block;
  padding: 1px 7px;
  border-radius: 3px;
  font-family: var(--fm);
  font-size: .62rem;
  background: var(--s3);
  color: var(--t2);
  border: 1px solid var(--b1);
}
.empty {
  text-align: center;
  padding: 44px 20px;
  font-family: var(--fm);
  font-size: .78rem;
  color: var(--t3);
}
.spin {
  width: 13px; height: 13px;
  border: 2px solid var(--b0);
  border-top-color: var(--lime);
  border-radius: 50%;
  animation: sp .6s linear infinite;
  flex-shrink: 0;
  display: inline-block;
  vertical-align: middle;
}
@keyframes sp { to { transform: rotate(360deg); } }
.loading { display: flex; align-items: center; gap: 9px; color: var(--t2); font-family: var(--fm); font-size: .8rem; padding: 36px 0; }
.divider { height: 1px; background: var(--b1); margin: 15px 0; }
.flex { display: flex; } .g2 { gap: 8px; } .ac { align-items: center; } .f1 { flex: 1; }
.mt1{margin-top:4px} .mt2{margin-top:8px} .mt3{margin-top:13px} .mt4{margin-top:20px}
.text-sm{font-size:.8rem} .xs{font-size:.7rem} .muted{color:var(--t2)} .dim{color:var(--t2)}
code { font-family: var(--fm); background: var(--s3); padding: 1px 5px; border-radius: 3px; font-size: .74rem; color: var(--lime); }
.pag { display: flex; align-items: center; gap: 8px; margin-top: 14px; justify-content: flex-end; font-family: var(--fm); font-size: .72rem; color: var(--t2); }
.search {
  background: var(--bg);
  border: 1px solid var(--b0);
  border-radius: var(--r);
  padding: 7px 11px;
  color: var(--t0);
  font-size: .82rem;
  font-family: var(--f);
  outline: none;
  width: 235px;
  transition: border .13s;
}
.search:focus { border-color: var(--lime); box-shadow: 0 0 0 3px var(--limedim); }

</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-wrapper">
  <div class="auth-box">
    <div class="auth-hd">
      <h1>Web<span>Scan</span></h1>
      <p>security intelligence &nbsp;&middot;&nbsp; v2.1</p>
    </div>
    <div class="auth-card">
      <div class="auth-tabs">
        <div class="atab-btn active" onclick="showTab('login')">Sign in</div>
        <div class="atab-btn" onclick="showTab('register')">Register</div>
      </div>
      <div class="auth-body">
        <div id="auth-err" class="err" style="display:none"></div>
        <div id="tab-login">
          <form onsubmit="doLogin();return false;">
            <div class="fg"><label>Username</label><input id="lu" type="text" placeholder="username" autocomplete="username"></div>
            <div class="fg"><label>Password</label><input id="lp" type="password" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" autocomplete="current-password"></div>
            <button type="submit" class="btn btn-lime btn-full" id="login-btn">Sign in</button>
          </form>
        </div>
        <div id="tab-register" style="display:none">
          <form onsubmit="doRegister();return false;">
            <div class="fg"><label>Username</label><input id="ru" type="text" placeholder="username" autocomplete="username"></div>
            <div class="fg"><label>Email</label><input id="re" type="email" placeholder="you@example.com" autocomplete="email"></div>
            <div class="fg"><label>Password</label><input id="rp" type="password" placeholder="min 8 characters" autocomplete="new-password"></div>
            <button type="submit" class="btn btn-lime btn-full">Create account</button>

</div>

<!-- APP -->
<div id="app" style="display:none">
  <nav id="sidebar">
    <div class="sb-top">
      <div class="sb-brand">
        <div class="sb-icon">
          <svg viewBox="0 0 18 18" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 2L15 5.5V9.5C15 12.8 12.3 15.8 9 17C5.7 15.8 3 12.8 3 9.5V5.5L9 2Z"/>
            <path d="M6.5 9l2 2 3-3"/>
          </svg>
        </div>
        <div>
          <div class="sb-wordmark">WebScan</div>
          <div class="sb-build">v2.1 &nbsp;&middot;&nbsp; active</div>
        </div>
      </div>
    </div>
    <div class="sb-nav">
      <div class="sb-group">Scanner</div>
      <div class="sb-link" data-page="dashboard" onclick="go('dashboard')">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M2 2h5v5H2V2zm7 0h5v5H9V2zM2 9h5v5H2V9zm7 0h5v5H9V9z"/></svg>
        Dashboard
      </div>
      <div class="sb-link" data-page="new-scan" onclick="go('new-scan')">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 2a6 6 0 100 12A6 6 0 008 2zm1 3v2h2a1 1 0 110 2H9v2a1 1 0 11-2 0V9H5a1 1 0 110-2h2V5a1 1 0 012 0z"/></svg>
        New Scan
      </div>
      <div class="sb-link" data-page="scans" onclick="go('scans')">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M1 3h14v1.5H1zm0 4h14v1.5H1zm0 4h9v1.5H1z"/></svg>
        History
      </div>
      <div class="sb-link" data-page="diff" onclick="go('diff')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><path d="M4 2v12M12 2v12M2 6h4M10 6h4M2 10h4M10 10h4"/></svg>
        Report Diff
      </div>
    </div>
    <div id="admin-nav" style="display:none">
      <div class="sb-group">Control</div>
      <div class="sb-link" data-page="admin" onclick="go('admin')">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a3 3 0 110 6A3 3 0 018 1zm0 7c3.3 0 6 1.3 6 3v1H2v-1c0-1.7 2.7-3 6-3z"/></svg>
        Admin
        <span class="sb-badge">ROOT</span>
      </div>
    </div>
    <div class="sb-footer">
      <div class="sb-user">
        <div class="sb-av" id="nav-av">?</div>
        <div class="sb-name" id="nav-nm"></div>
        <div id="nav-cr" style="display:none" class="sb-crown">&#9733;</div>
      </div>
      <div class="sb-btns">
        <button class="btn btn-ghost btn-sm" style="flex:1;justify-content:center" onclick="go('settings')">Settings</button>
        <button class="btn btn-ghost btn-sm" onclick="doLogout()">Exit</button>
      </div>
    </div>
  </nav>
  <main>
    <div class="main-inner" id="pg"></div>
  </main>
</div>

<script>
'use strict';

// ── State ──────────────────────────────────────────────────────────────────
let TOKEN = localStorage.getItem('ws_tok') || '';
let USER  = JSON.parse(localStorage.getItem('ws_usr') || 'null');

const SC  = {CRITICAL:'#FF4949',HIGH:'#FF8C3D',MEDIUM:'#FFD23F',LOW:'#4B9BFF',INFO:'#5C5C66'};
const SBG = {CRITICAL:'rgba(255,73,73,.12)',HIGH:'rgba(255,140,61,.12)',MEDIUM:'rgba(255,210,63,.12)',LOW:'rgba(75,155,255,.12)',INFO:'rgba(92,92,102,.1)'};

// ── API ────────────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = {
    method,
    headers: {
      'Content-Type': 'application/json',
      ...(TOKEN ? {Authorization: 'Bearer ' + TOKEN} : {}),
    },
  };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const r = await fetch('/api' + path, opts);
  const d = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(d.detail || r.statusText);
  return d;
}

// ── Auth ───────────────────────────────────────────────────────────────────
function showAuthErr(msg) {
  const e = document.getElementById('auth-err');
  e.textContent = msg;
  e.style.display = 'block';
}

function showTab(tab) {
  document.getElementById('auth-err').style.display = 'none';
  document.getElementById('tab-login').style.display    = tab === 'login'    ? '' : 'none';
  document.getElementById('tab-register').style.display = tab === 'register' ? '' : 'none';
  document.querySelectorAll('.atab-btn').forEach((el, i) =>
    el.classList.toggle('active', (i === 0) === (tab === 'login'))
  );
}

async function doLogin() {
  const btn = document.getElementById('login-btn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spin" style="display:inline-block"></div> Signing in';
  try {
    const d = await api('POST', '/auth/login', {
      username: document.getElementById('lu').value.trim(),
      password: document.getElementById('lp').value,
    });
    setSession(d);
  } catch (e) {
    showAuthErr(e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Sign in';
  }
}

async function doRegister() {
  try {
    const d = await api('POST', '/auth/register', {
      username: document.getElementById('ru').value.trim(),
      email:    document.getElementById('re').value.trim(),
      password: document.getElementById('rp').value,
    });
    setSession(d);
  } catch (e) {
    showAuthErr(e.message);
  }
}

document.addEventListener('keydown', function(e) {
  if (e.key !== 'Enter') return;
  if (document.getElementById('auth-wrapper').style.display === 'none') return;
  if (document.getElementById('tab-register').style.display === 'none') doLogin();
  else doRegister();
});

function setSession(d) {
  TOKEN = d.access_token;
  USER  = d.user;
  localStorage.setItem('ws_tok', TOKEN);
  localStorage.setItem('ws_usr', JSON.stringify(USER));
  bootApp();
}

async function doLogout() {
  try { await api('POST', '/auth/logout'); } catch (_) {}
  TOKEN = ''; USER = null;
  localStorage.removeItem('ws_tok');
  localStorage.removeItem('ws_usr');
  document.getElementById('app').style.display = 'none';
  document.getElementById('auth-wrapper').style.display = '';
  showTab('login');
}

function bootApp() {
  document.getElementById('auth-wrapper').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  const u = USER && USER.username ? USER.username : '';
  document.getElementById('nav-nm').textContent = u;
  document.getElementById('nav-av').textContent = u[0] ? u[0].toUpperCase() : '?';
  if (USER && USER.is_admin) {
    document.getElementById('admin-nav').style.display = '';
    document.getElementById('nav-cr').style.display = '';
  }
  go('dashboard');
}

// ── Router ─────────────────────────────────────────────────────────────────
function go(page, data) {
  document.querySelectorAll('.sb-link').forEach(function(l) {
    l.classList.toggle('active', l.dataset.page === page);
  });
  var el = document.getElementById('pg');
  el.innerHTML = '';
  var map = {
    'dashboard':    pgDashboard,
    'new-scan':     pgNewScan,
    'scans':        pgHistory,
    'diff':         pgDiff,
    'settings':     pgSettings,
    'admin':        pgAdmin,
    'scan-live':    pgScanLive,
    'scan-detail':  pgScanDetail,
  };
  if (map[page]) map[page](el, data || null);
}

// ── Helpers ────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function rel(iso) {
  if (!iso) return '';
  var d = Math.round((Date.now() - new Date(iso)) / 1000);
  if (d < 60)    return d + 's ago';
  if (d < 3600)  return Math.floor(d/60) + 'm ago';
  if (d < 86400) return Math.floor(d/3600) + 'h ago';
  return new Date(iso).toLocaleDateString();
}
function sevBadge(s) {
  return '<span class="sev-pll" style="background:' + (SBG[s]||SBG.INFO) + ';color:' + (SC[s]||SC.INFO) + '">' + s + '</span>';
}
function pill(s) {
  return '<span class="spill sp-' + s + '">' + s.toUpperCase() + '</span>';
}
function dot(st) {
  var c = {complete:'dot-c',running:'dot-r',pending:'dot-p',error:'dot-e'};
  return '<div class="scan-dot ' + (c[st]||'dot-p') + '"></div>';
}
function scanRow(s) {
  var chips = '';
  if (s.status === 'complete') {
    var sm = s.summary || {};
    if (sm.critical) chips += '<span class="chip chip-c">' + sm.critical + 'C</span>';
    if (sm.high)     chips += '<span class="chip chip-h">' + sm.high + 'H</span>';
    if (sm.medium)   chips += '<span class="chip chip-m">' + sm.medium + 'M</span>';
    if (chips) chips = '<div class="scan-chips">' + chips + '</div>';
  }
  var meta = rel(s.created_at) + ' &middot; ' + s.profile;
  if (s.username) meta += ' &middot; ' + esc(s.username);
  meta += ' &middot; ' + ((s.summary && s.summary.pages_crawled) || 0) + 'p';
  return '<div class="scan-row" onclick="go(\'scan-detail\',{id:\'' + s.id + '\'})"><div class="scan-dot ' + ({complete:'dot-c',running:'dot-r',pending:'dot-p',error:'dot-e'}[s.status]||'dot-p') + '"></div><div class="scan-info"><div class="scan-url">' + esc(s.target) + '</div><div class="scan-meta">' + meta + '</div></div>' + chips + pill(s.status) + '</div>';
}

function statCard(lbl, val, extra) {
  return '<div class="stat' + (extra ? ' ' + extra : '') + '"><div class="stat-lbl">' + lbl + '</div><div class="stat-val">' + val + '</div></div>';
}

// ── Dashboard ──────────────────────────────────────────────────────────────
async function pgDashboard(el) {
  el.innerHTML = '<div class="pg-hd"><div><div class="pg-title">Dashboard</div><div class="pg-sub">overview &amp; intelligence</div></div><button class="btn btn-lime btn-sm" onclick="go(\'new-scan\')">New Scan</button></div><div class="loading"><div class="spin"></div>Loading&hellip;</div>';
  try {
    var scans = await api('GET', '/scans?limit=100');
    var done  = scans.filter(function(s) { return s.status === 'complete'; });
    function sum(k) { return done.reduce(function(a,s) { return a + ((s.summary && s.summary[k]) || 0); }, 0); }
    var tf = sum('total'), cr = sum('critical'), hi = sum('high'), me = sum('medium'), lo = sum('low'), inf = sum('info');
    var bySev = {CRITICAL:cr,HIGH:hi,MEDIUM:me,LOW:lo,INFO:inf};
    var mx = Math.max.apply(null, Object.values(bySev).concat([1]));
    var bars = Object.keys(bySev).filter(function(k){return bySev[k]>0;}).map(function(sv) {
      return '<div class="sev-bar"><div class="sb-l" style="color:' + SC[sv] + '">' + sv + '</div><div class="sb-t"><div class="sb-f" style="width:' + Math.round(bySev[sv]/mx*100) + '%;background:' + SC[sv] + '"></div></div><div class="sb-n">' + bySev[sv] + '</div></div>';
    }).join('');
    var running = scans.filter(function(s){return s.status==='running';}).length;
    el.innerHTML =
      '<div class="pg-hd"><div><div class="pg-title">Dashboard</div><div class="pg-sub">overview &amp; intelligence</div></div><button class="btn btn-lime btn-sm" onclick="go(\'new-scan\')">New Scan</button></div>' +
      '<div class="stat-row">' +
        '<div class="stat"><div class="stat-lbl">Scans</div><div class="stat-val">' + scans.length + '</div><div class="stat-foot">' + done.length + ' complete</div></div>' +
        '<div class="stat"><div class="stat-lbl">Findings</div><div class="stat-val">' + tf + '</div></div>' +
        '<div class="stat" style="border-left:2px solid var(--sc)"><div class="stat-lbl" style="color:var(--sc)">Critical</div><div class="stat-val" style="color:var(--sc)">' + cr + '</div></div>' +
        '<div class="stat" style="border-left:2px solid var(--sh)"><div class="stat-lbl" style="color:var(--sh)">High</div><div class="stat-val" style="color:var(--sh)">' + hi + '</div></div>' +
        '<div class="stat"><div class="stat-lbl" style="color:var(--sl)">Running</div><div class="stat-val" style="color:var(--sl)">' + running + '</div></div>' +
      '</div>' +
      '<div style="display:grid;grid-template-columns:1fr 258px;gap:10px">' +
        '<div class="card"><div class="card-title">Recent Scans</div><div class="scan-list">' + (scans.length ? scans.slice(0,7).map(scanRow).join('') : '<div class="empty">No scans yet.</div>') + '</div>' + (scans.length > 7 ? '<div style="text-align:center;margin-top:10px"><button class="btn btn-ghost btn-sm" onclick="go(\'scans\')">View all ' + scans.length + '</button></div>' : '') + '</div>' +
        '<div class="card"><div class="card-title">Severity</div>' + (tf === 0 ? '<div class="empty" style="padding:14px 0">No findings yet.</div>' : bars) + '</div>' +
      '</div>';
  } catch(e) {
    var l = el.querySelector('.loading');
    if (l) l.outerHTML = '<div class="err">' + esc(e.message) + '</div>';
  }
}

// ── New Scan ───────────────────────────────────────────────────────────────
var PROFS = {
  quick:    {tag:'QUICK',    desc:'Headers & exposure only'},
  standard: {tag:'STANDARD', desc:'Full input testing'},
  full:     {tag:'FULL',     desc:'Everything + blind SQLi'},
  api:      {tag:'API',      desc:'API & JSON focus'},
  pentest:  {tag:'PENTEST',  desc:'Admin bypass, JWT attacks, secret extraction'},
};
var TOGS = [
  {key:'run_xss',label:'Reflected XSS'},{key:'run_sqli',label:'Error SQLi'},
  {key:'run_blind_sqli',label:'Blind SQLi'},{key:'run_stored_xss',label:'Stored XSS'},
  {key:'run_csrf',label:'CSRF'},{key:'run_idor',label:'IDOR'},
  {key:'run_headers',label:'Headers'},{key:'run_redirects',label:'Redirects'},
  {key:'run_exposure',label:'File Exposure'},{key:'run_info_leak',label:'Info Leaks'},
  {key:'run_path_bruteforce',label:'Path Bruteforce'},{key:'run_jwt_analysis',label:'JWT Analysis'},
  {key:'run_tech_fingerprint',label:'Tech Fingerprint'},{key:'run_js_secrets',label:'JS Secrets'},
  {key:'run_admin_probe',label:'Admin Probe ⚠'},
];
var selProf = 'standard';

function pgNewScan(el) {
  var profCards = Object.keys(PROFS).map(function(k) {
    var v = PROFS[k];
    return '<div class="prof-card ' + (k===selProf?'sel':'') + '" id="pc-' + k + '" onclick="pickProf(\'' + k + '\')">' +
      '<div class="prof-tag">' + v.tag + '</div>' +
      '<div class="prof-name">' + k[0].toUpperCase() + k.slice(1) + '</div>' +
      '<div class="prof-desc">' + v.desc + '</div>' +
      '</div>';
  }).join('');
  var togInputs = TOGS.map(function(t) {
    return '<label class="tog"><input type="checkbox" id="tog-' + t.key + '"> ' + t.label + '</label>';
  }).join('');
  el.innerHTML =
    '<div class="pg-hd"><div><div class="pg-title">New Scan</div><div class="pg-sub">configure and launch</div></div></div>' +
    '<div id="sc-err" class="err" style="display:none"></div>' +
    '<div class="card" style="margin-bottom:12px">' +
      '<div class="sec">Target URL</div>' +
      '<div class="fg" style="margin-bottom:20px"><input id="sc-url" type="url" placeholder="https://target.example.com" style="font-size:.97rem;padding:11px 13px"></div>' +
      '<div class="sec">Profile</div>' +
      '<div class="prof-grid">' + profCards + '</div>' +
      '<div class="divider"></div>' +
      '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:16px">' +
        '<div class="fg" style="margin:0"><label>Max Depth</label><select id="sc-d"><option>1</option><option>2</option><option selected>3</option><option>4</option><option>5</option></select></div>' +
        '<div class="fg" style="margin:0"><label>Max Pages</label><select id="sc-p"><option>25</option><option>50</option><option selected>100</option><option>200</option><option>500</option></select></div>' +
        '<div class="fg" style="margin:0"><label>Delay (s)</label><select id="sc-l"><option>0.1</option><option selected>0.3</option><option>0.5</option><option>1.0</option><option>2.0</option></select></div>' +
      '</div>' +
      '<div class="sec">Module Overrides</div>' +
      '<div class="tog-grid">' + togInputs + '</div>' +
    '</div>' +
    '<button class="btn btn-lime" id="lb" onclick="launch()" style="padding:10px 22px">Launch Scan</button>' +
    '<span id="ls" class="muted xs" style="margin-left:10px;font-family:var(--fm)"></span>';
}

function pickProf(p) {
  selProf = p;
  document.querySelectorAll('.prof-card').forEach(function(b){b.classList.remove('sel');});
  var el = document.getElementById('pc-' + p);
  if (el) el.classList.add('sel');
}

async function launch() {
  var t = document.getElementById('sc-url').value.trim();
  if (!t) {
    var e = document.getElementById('sc-err');
    e.textContent = 'Enter a target URL.';
    e.style.display = 'block';
    return;
  }
  var ov = {};
  TOGS.forEach(function(tog) {
    var el = document.getElementById('tog-' + tog.key);
    if (el && el.checked) ov[tog.key] = true;
  });
  var btn = document.getElementById('lb');
  btn.disabled = true;
  btn.innerHTML = '<div class="spin" style="display:inline-block"></div> Launching';
  document.getElementById('sc-err').style.display = 'none';
  try {
    var body = Object.assign({
      target:    t,
      profile:   selProf,
      max_depth: parseInt(document.getElementById('sc-d').value),
      max_pages: parseInt(document.getElementById('sc-p').value),
      delay:     parseFloat(document.getElementById('sc-l').value),
    }, ov);
    var s = await api('POST', '/scans', body);
    go('scan-live', s);
  } catch(e) {

// ── Live Scan ──────────────────────────────────────────────────────────────
function pgScanLive(el, scan) {
  el.innerHTML =
    '<div class="flex ac g2" style="margin-bottom:6px">' +
      '<button class="btn btn-ghost btn-sm" onclick="go(\'scans\')">&larr;</button>' +
      '<div><div class="pg-title" style="font-size:1.15rem">Scanning</div><div class="pg-sub" style="font-family:var(--fm)">' + esc(scan.target) + '</div></div>' +
      '<div class="spin" style="margin-left:4px"></div>' +
    '</div>' +
    '<div class="card mt3">' +
      '<div style="display:flex;justify-content:space-between;font-family:var(--fm);font-size:.7rem;color:var(--t2);margin-bottom:6px">' +
        '<span id="ph" class="tcursor">Initialising</span>' +
        '<span id="pc2" style="color:var(--lime)"></span>' +
      '</div>' +
      '<div class="pb-wrap"><div class="pb" id="pb" style="width:2%"></div></div>' +
      '<div class="term mt2" id="log"></div>' +
      '<div id="lfl" class="sec mt3" style="display:none">Live Findings</div>' +
      '<div class="lf-list" id="lf"></div>' +
    '</div>' +
    '<div id="done" style="display:none;margin-top:14px">' +
      '<button class="btn btn-lime" onclick="go(\'scan-detail\',{id:\'' + scan.id + '\'})">View Report &rarr;</button>' +
    '</div>';

  var logEl = document.getElementById('log');
  var lfEl  = document.getElementById('lf');
  var phEl  = document.getElementById('ph');
  var PCTS  = {crawling:8,discovery:16,headers:22,csrf:28,info_leak:34,exposure:40,stored_xss:48,api_fuzz:56,fuzzing:64,tech_fingerprint:70,js_secrets:76,path_bruteforce:84,jwt_analysis:90,admin_probe:96};

  function addLog(txt, cls) {
    var d = document.createElement('div');
    if (cls) d.className = 't-' + cls;
    d.textContent = '[' + new Date().toLocaleTimeString('en',{hour12:false}) + '] ' + txt;
    logEl.appendChild(d);
    logEl.scrollTop = logEl.scrollHeight;
  }

  var wsProto = location.protocol === 'https:' ? 'wss' : 'ws';
  var ws = new WebSocket(wsProto + '://' + location.host + '/api/ws/' + scan.id + '?token=' + TOKEN);

  ws.onmessage = function(e) {
    var m = JSON.parse(e.data);
    if (m.type === 'phase') {
      document.getElementById('pb').style.width = (PCTS[m.data.phase] || 0) + '%';
      phEl.textContent = m.data.message;
      addLog(m.data.message, 'phase');
    } else if (m.type === 'progress') {
      if (m.data.current && m.data.total) {
        document.getElementById('pb').style.width = Math.min(94, 66 + (m.data.current/m.data.total*28)) + '%';
        document.getElementById('pc2').textContent = m.data.current + '/' + m.data.total;
      }
      addLog(m.data.message);
    } else if (m.type === 'finding') {
      var f = m.data;
      document.getElementById('lfl').style.display = '';
      var r = document.createElement('div');
      r.className = 'lf-row';
      r.innerHTML = '<span class="xdot" style="background:' + (SC[f.severity]||SC.INFO) + '"></span><span style="color:' + SC[f.severity] + ';font-weight:700;width:72px;font-size:.64rem;font-family:var(--fm)">' + f.severity + '</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + esc(f.vuln_type) + '</span>';
      lfEl.appendChild(r);
      lfEl.scrollTop = lfEl.scrollHeight;
      addLog('FOUND [' + f.severity + '] ' + f.vuln_type, 'find');
    } else if (m.type === 'complete') {
      document.getElementById('pb').style.width = '100%';
      phEl.className = '';
      phEl.textContent = 'Complete';
      var s = m.data.summary;
      addLog('Done — ' + s.total + ' findings: ' + s.critical + 'C ' + s.high + 'H ' + s.medium + 'M', 'ok');
      document.getElementById('done').style.display = '';
    } else if (m.type === 'error') {
      addLog('Error: ' + m.data.message, 'err');
      document.getElementById('done').style.display = '';
    }
  };
  ws.onerror = function() { addLog('WebSocket error', 'err'); };
}

function renderFinds(fs) {
  if (!fs.length) return '<div class="empty">No vulnerabilities detected.</div>';
  var bySev = {};
  fs.forEach(function(f) { bySev[f.severity] = bySev[f.severity] || []; bySev[f.severity].push(f); });
  var filters = '<span class="f-lbl">FILTER</span><span class="fb on" onclick="filtF(\'ALL\',this)" style="color:var(--t2)">ALL (' + fs.length + ')</span>';
  ['CRITICAL','HIGH','MEDIUM','LOW','INFO'].forEach(function(sv) {
    if (bySev[sv]) filters += '<span class="fb" onclick="filtF(\'' + sv + '\',this)" style="color:' + SC[sv] + '">' + sv + ' (' + bySev[sv].length + ')</span>';
  });
  return '<div class="filter-bar">' + filters + '</div><div id="fi-list">' + fs.map(findCard).join('') + '</div>';
}

function filtF(sev, btn) {
  document.querySelectorAll('.fb').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  document.querySelectorAll('.fi').forEach(function(c){
    c.style.display = (sev==='ALL'||c.dataset.sev===sev) ? '' : 'none';
  });
}

    '<table class="mtbl">' +

      '<div class="xdot" style="background:' + SC[f.severity] + '"></div>' +

}
async function aTog(id,a){try{await api('PATCH','/admin/users/'+id,{is_active:a});aSwitch('users');}catch(e){alert(e.message);}}
async function aAdm(id,a){if(!confirm((a?'Grant':'Remove')+' admin?'))return;try{await api('PATCH','/admin/users/'+id,{is_admin:a});aSwitch('users');}catch(e){alert(e.message);}}
async function aDel(id,n){if(!confirm('Delete "'+n+'" and all their scans?'))return;try{await api('DELETE','/admin/users/'+id);aSwitch('users');}catch(e){alert(e.message);}}

var sSkip = 0;
async function aScans(el) {
  try {
    var d = await api('GET', '/admin/scans?limit=50&skip=' + sSkip);
    var rows = d.scans.map(function(s) {
      var meta = rel(s.created_at) + ' &middot; ' + s.profile + (s.username?' &middot; '+s.username:'');
      return '<div class="scan-row" style="cursor:default"><div class="scan-dot ' + ({complete:'dot-c',running:'dot-r',pending:'dot-p',error:'dot-e'}[s.status]||'dot-p') + '"></div><div class="scan-info"><div class="scan-url">' + esc(s.target) + '</div><div class="scan-meta">' + meta + '</div></div><div class="flex g2 ac">' + pill(s.status) + '<button class="btn btn-danger btn-sm" onclick="aDS(\'' + s.id + '\')">Del</button></div></div>';
    }).join('');
    el.innerHTML =
      '<div style="margin-bottom:12px"><span class="muted xs" style="font-family:var(--fm)">' + d.total + ' scans</span></div>' +
      '<div class="scan-list">' + rows + '</div>' +
      '<div class="pag">' +
        (sSkip>0?'<button class="btn btn-ghost btn-sm" onclick="sSkip=Math.max(0,sSkip-50);aSwitch(\'scans\')">&larr;</button>':'') +
        '<span>' + (sSkip+1) + '–' + Math.min(sSkip+50,d.total) + ' of ' + d.total + '</span>' +
        (sSkip+50<d.total?'<button class="btn btn-ghost btn-sm" onclick="sSkip+=50;aSwitch(\'scans\')">&rarr;</button>':'') +
      '</div>';
  } catch(e) { el.innerHTML = '<div class="err">' + esc(e.message) + '</div>'; }
}
async function aDS(id){if(!confirm('Delete?'))return;try{await api('DELETE','/admin/scans/'+id);aSwitch('scans');}catch(e){alert(e.message);}}

async function aAudit(el) {
  try {
    var d = await api('GET', '/admin/audit?limit=100');
    var rows = d.entries.map(function(e) {
      var res = e.success ? '<span style="color:var(--lime);font-family:var(--fm);font-size:.68rem;font-weight:600">OK</span>' : '<span style="color:var(--sc);font-family:var(--fm);font-size:.68rem;font-weight:600">FAIL</span>';
      return '<tr><td class="muted" style="font-family:var(--fm);font-size:.7rem">' + new Date(e.timestamp).toLocaleString() + '</td><td><code>' + esc(e.action) + '</code></td><td style="font-weight:600">' + (e.username?esc(e.username):'<span class="muted">—</span>') + '</td><td class="muted" style="font-family:var(--fm);font-size:.7rem">' + (e.ip||'—') + '</td><td class="muted" style="font-size:.74rem;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + esc(e.detail||'') + '</td><td>' + res + '</td></tr>';
    }).join('');
    el.innerHTML = '<div class="muted xs" style="font-family:var(--fm);margin-bottom:10px">' + d.total + ' entries &middot; latest 100</div><table class="tbl"><thead><tr><th>Time</th><th>Action</th><th>User</th><th>IP</th><th>Detail</th><th>Result</th></tr></thead><tbody>' + rows + '</tbody></table>';
  } catch(e) { el.innerHTML = '<div class="err">' + esc(e.message) + '</div>'; }
}

async function aLogins(el) {
  try {
    var d   = await api('GET', '/admin/login-attempts?limit=200');
    var ok  = d.filter(function(a){return a.success;}).length;
    var bad = d.filter(function(a){return !a.success;}).length;
    var rows = d.map(function(a) {
      var res = a.success ? '<span style="color:var(--lime);font-family:var(--fm);font-size:.7rem;font-weight:700">OK</span>' : '<span style="color:var(--sc);font-family:var(--fm);font-size:.7rem;font-weight:700">FAIL</span>';
      return '<tr><td class="muted" style="font-family:var(--fm);font-size:.7rem">' + new Date(a.timestamp).toLocaleString() + '</td><td><code>' + esc(a.ip) + '</code></td><td style="font-weight:600">' + esc(a.username) + '</td><td>' + res + '</td></tr>';
    }).join('');
    el.innerHTML =
      '<div class="stat-row" style="max-width:380px;margin-bottom:16px">' +
        '<div class="stat"><div class="stat-lbl">Total</div><div class="stat-val" style="font-size:1.55rem">' + d.length + '</div></div>' +
        '<div class="stat" style="border-left:2px solid var(--lime)"><div class="stat-lbl" style="color:var(--lime)">OK</div><div class="stat-val" style="color:var(--lime);font-size:1.55rem">' + ok + '</div></div>' +
        '<div class="stat" style="border-left:2px solid var(--sc)"><div class="stat-lbl" style="color:var(--sc)">Failed</div><div class="stat-val" style="color:var(--sc);font-size:1.55rem">' + bad + '</div></div>' +
      '</div>' +
      '<table class="tbl"><thead><tr><th>Time</th><th>IP</th><th>Username</th><th>Result</th></tr></thead><tbody>' + rows + '</tbody></table>';
  } catch(e) { el.innerHTML = '<div class="err">' + esc(e.message) + '</div>'; }
}

// ── Boot ───────────────────────────────────────────────────────────────────
if (TOKEN && USER) {
  bootApp();
} else {
  document.getElementById('auth-wrapper').style.display = 'flex';
  // auth-wrapper is shown by CSS default (display:flex), just ensure it's visible
}
</script>
</body>
</html>
